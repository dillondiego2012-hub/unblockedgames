<!DOCTYPE html>
<html>
<head>
  <title>Unblocked Games</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111827;
    }

    h1 {
      margin: 0;
    }

    /* SEARCH BAR */
    .search-box {
      margin-top: 10px;
    }

    input {
      padding: 10px;
      width: 60%;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .section {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .play {
      background: #22c55e;
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 6px;
    }

    .play:hover {
      background: #16a34a;
    }

    iframe {
      width: 100%;
      height: 180px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<header>
  <h1>🎮 Unblocked Games</h1>

  <!-- SEARCH BAR -->
  <div class="search-box">
    <input id="search" placeholder="Search DuckDuckGo...">
    <button onclick="search()">Search</button>
  </div>
</header>

<!-- GAMES SECTION -->
<div class="section">
  <h2>🎮 Games</h2>

  <div class="grid">

    <div class="card">
      <h3>Baseball Bros</h3>
      <iframe src="PASTE_GAME_LINK_HERE"></iframe>
      <button class="play">Play</button>
    </div>

    <div class="card">
      <h3>BitLife</h3>
      <iframe src="PASTE_GAME_LINK_HERE"></iframe>
      <button class="play">Play</button>
    </div>

  </div>
</div>

<!-- MOVIES SECTION -->
<div class="section">
  <h2>🎬 Movies</h2>

  <div class="grid">

    <div class="card">
      <h3>Movie 1</h3>
      <iframe src="PASTE_MOVIE_LINK_HERE"></iframe>
      <button class="play">Watch</button>
    </div>

  </div>
</div>

<script>
function search() {
  let q = document.getElementById("search").value;
  window.location.href = "https://duckduckgo.com/?q=" + q;
}
</script>

</body>
</html>
