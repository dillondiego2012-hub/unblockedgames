<!DOCTYPE html>
<html>
<head>
  <title>Unblocked Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;

      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* TITLE */
    h1 {
      font-size: 60px;
      margin-bottom: 10px;
    }

    /* BIG CLOCK */
    #clock {
      font-size: 48px;   /* 👈 BIGGER CLOCK */
      font-weight: bold;
      color: #38bdf8;
      margin-bottom: 40px;
    }

    /* BUTTON ROW */
    .button-row {
      display: flex;
      gap: 25px;
    }

    .btn {
      padding: 20px 50px;
      font-size: 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #1e293b;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      background: #334155;
      transform: scale(1.08);
    }
  </style>
</head>

<body>

  <!-- TITLE -->
  <h1>🎮 Unblocked Games</h1>

  <!-- BIG CLOCK (ABOVE BUTTONS) -->
  <div id="clock"></div>

  <!-- BUTTONS -->
  <div class="button-row">

    <button class="btn" onclick="location.href='games.html'">
      🎮 Games
    </button>

    <button class="btn" onclick="location.href='movies.html'">
      🎬 Movies
    </button>

  </div>

  <!-- CLOCK SCRIPT -->
  <script>
    function updateClock() {
      let now = new Date();

      let hours = now.getHours();
      let minutes = now.getMinutes();
      let seconds = now.getSeconds();

      let ampm = hours >= 12 ? "PM" : "AM";

      hours = hours % 12;
      hours = hours ? hours : 12;

      minutes = minutes < 10 ? "0" + minutes : minutes;
      seconds = seconds < 10 ? "0" + seconds : seconds;

      document.getElementById("clock").innerText =
        hours + ":" + minutes + ":" + seconds + " " + ampm;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
