<!DOCTYPE html>
<html>
<head>
  <title>Unblocked Games</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
    }

    h1 {
      font-size: 40px;
    }

    .buttons {
      margin-top: 40px;
    }

    .btn {
      display: block;
      margin: 20px auto;

      width: 250px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #1e293b;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      background: #334155;
    }
  </style>
</head>

<body>

<header>
  <h1>🎮 Unblocked Hub</h1>
  <p>Choose where you want to go</p>
</header>

<div class="buttons">

  <button class="btn" onclick="location.href='games.html'">
    🎮 Games
  </button>

  <button class="btn" onclick="location.href='movies.html'">
    🎬 Movies
  </button>

</div>

</body>
</html>
