<!DOCTYPE html>
<html>
<head>
  <title>Unblocked Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;

      /* centers everything */
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 30px;
      color: #cbd5e1;
    }

    /* horizontal button row */
    .button-row {
      display: flex;
      gap: 20px;
    }

    .btn {
      padding: 20px 40px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #1e293b;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      background: #334155;
      transform: scale(1.05);
    }
  </style>

</head>

<body>

  <h1>🎮 Unblocked Hub</h1>
  <p>Choose where you want to go</p>

  <div class="button-row">

    <button class="btn" onclick="location.href='games.html'">
      🎮 Games
    </button>

    <button class="btn" onclick="location.href='movies.html'">
      🎬 Movies
    </button>

  </div>

</body>
</html>
