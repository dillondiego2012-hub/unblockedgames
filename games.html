<!DOCTYPE html>
<html>
<head>
  <title>Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 50px;
    }

    /* BIG BACK BUTTON */
    .back-btn {
      margin-top: 20px;
      padding: 15px 40px;
      font-size: 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #334155;
      color: white;
      transition: 0.2s;
    }

    .back-btn:hover {
      background: #475569;
      transform: scale(1.05);
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 30px;
    }

    .game-btn {
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #1e293b;
      color: white;
      min-width: 160px;
      transition: 0.2s;
    }

    .game-btn:hover {
      background: #334155;
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<h1>🎮 Games</h1>

<!-- BIG BACK BUTTON -->
<button class="back-btn" onclick="location.href='index.html'">
  ⬅ Back to Home
</button>

<div class="container">

  <button class="game-btn" onclick="location.href='bitlife.html'">
    BitLife
  </button>

  <button class="game-btn" onclick="location.href='baseball.html'">
    Baseball Bros
  </button>

  <button class="game-btn" onclick="location.href='game3.html'">
    Game 3
  </button>

  <button class="game-btn" onclick="location.href='game4.html'">
    Game 4
  </button>

</div>

</body>
</html>
