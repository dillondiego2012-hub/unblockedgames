<!DOCTYPE html>
<html>
<head>
  <title>Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 50px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 30px;
    }

    /* SMALL BUTTON STYLE */
    .game-btn {
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #1e293b;
      color: white;
      transition: 0.2s;
      min-width: 180px;
    }

    .game-btn:hover {
      background: #334155;
      transform: scale(1.05);
    }

    .back {
      margin-top: 20px;
      padding: 10px 20px;
      background: #334155;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎮 Games</h1>

<button class="back" onclick="location.href='index.html'">⬅ Home</button>

<div class="container">

  <!-- GAMES LIST -->
  <button class="game-btn" onclick="window.open('PASTE_BASEBALL_LINK')">
    Baseball Bros
  </button>

  <button class="game-btn" onclick="window.open('PASTE_BITLIFE_LINK')">
    BitLife
  </button>

  <button class="game-btn" onclick="window.open('PASTE_GAME3_LINK')">
    Game 3
  </button>

  <button class="game-btn" onclick="window.open('PASTE_GAME4_LINK')">
    Game 4
  </button>

</div>

</body>
</html>
