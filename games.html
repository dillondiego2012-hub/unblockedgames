<!DOCTYPE html>
<html>
<head>
  <title>Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 50px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 30px;
    }

    .game-btn {
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #1e293b;
      color: white;
      min-width: 160px;
      transition: 0.2s;
    }

    .game-btn:hover {
      background: #334155;
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<h1>🎮 Games</h1>

<div class="container">

  <!-- YOUR GAMES -->

  <button class="game-btn" onclick="location.href='bitlife.html'">

  </button>

  <button class="game-btn" onclick="location.href='baseball.html'">

  </button>

  <!-- EXTRA SLOTS (ADD MORE LATER) -->

  <button class="game-btn" onclick="location.href='game5.html'">

</html>
