<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>BitLife - Life Simulator</title>

  <style>
    /* FIXED BASE LAYOUT (DO NOT SQUEEZE WITH VH) */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #333;
      font-family: "Myriad Pro", Helvetica, Arial, sans-serif;
    }

    /* GAME WRAPPER */
    .webgl-content {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #333;
    }

    #gameContainer {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    canvas {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    /* TOP BAR */
    #listLink {
      width: 100%;
      text-align: center;
      position: absolute;
      top: 0px;
      z-index: 999;
      background: rgb(119, 119, 255);
      opacity: 0.8;
    }

    #listLink ul {
      color: #fff;
      padding: 0;
      margin: 0;
      font-size: 20px;
      list-style: none;
    }

    #listLink li {
      padding: 5px;
      display: inline-block;
    }

    #listLink a {
      color: #fff;
      text-decoration: none;
    }

  </style>

  <!-- UNITY SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/TemplateData/UnityProgress.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/Build/UnityLoader.js"></script>

</head>

<body>

  <!-- TOP BAR (UNCHANGED STYLE) -->
  <div id="listLink">
    <ul>
      <li style="float:left;">
        <a href="#">BitLife</a>
      </li>

      <li style="float:right;">
        <a onclick="closeBacklinks()">❌</a>
      </li>
    </ul>
  </div>

  <!-- GAME -->
  <div class="webgl-content">
    <div id="gameContainer"></div>
  </div>

  <!-- LOAD GAME -->
  <script>
    var unityInstance = UnityLoader.instantiate(
      "gameContainer",
      "https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/Build/BitLife.json",
      { onProgress: UnityProgress }
    );

    function closeBacklinks(){
      document.querySelector('#listLink').style.display = "none";
    }
  </script>

</body>
</html>
