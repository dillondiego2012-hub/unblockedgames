<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>BitLife - Life Simulator</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #333;
}

/* FIX: proper Unity container */
.webgl-content {
  width: 100%;
  height: 100%;
  position: fixed;
  top: 0;
  left: 0;
}

/* FIX: game container must fill screen */
#gameContainer {
  width: 100%;
  height: 100%;
  position: absolute;
}

/* FIX: canvas scaling issue */
canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}

/* REMOVE broken vh rule (THIS WAS YOUR ZOOM BUG)
body,html{width:62vh} ❌ DELETE THIS COMPLETELY
*/

/* top bar fix */
#listLink {
  width: 100%;
  text-align: center;
  position: absolute;
  top: 0;
  z-index: 999;
  background: rgb(119, 119, 255);
  opacity: 0.8;
}
</style>

<script src="https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/TemplateData/UnityProgress.js"></script>
<script src="https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/Build/UnityLoader.js"></script>

<script>
var unityInstance = UnityLoader.instantiate(
  "gameContainer",
  "https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/Build/BitLife.json",
  { onProgress: UnityProgress }
);
</script>

</head>

<body>

<div id="listLink">
  <ul style="color:#fff; padding:0; margin:0; font-size:20px;">
    <li style="display:inline-block; float:left; padding:5px;">
      <a href="#" style="color:#fff; text-decoration:none;">Bitlife</a>
    </li>
    <li style="display:inline-block; float:right; padding:5px;">
      <a onclick="return closeBacklinks();" style="color:#fff; text-decoration:none;">❌</a>
    </li>
  </ul>
</div>

<div class="webgl-content">
  <div id="gameContainer"></div>
</div>

<script>
function closeBacklinks(){
  document.querySelector('#listLink').style.display = "none";
}
</script>

</body>
</html>
