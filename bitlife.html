<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Embed</title>

<style>
/* Page setup */
body {
  margin: 0;
  background: #111;
  font-family: Arial, sans-serif;
}

/* Wrapper keeps everything centered */
.game-wrapper {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* This is the IMPORTANT part */
.game-container {
  width: 100%;
  max-width: 1100px;   /* controls max size so it doesn't zoom huge */
  height: 90vh;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
}

/* Forces iframe to scale correctly */
.game-container iframe {
  width: 100%;
  height: 100%;
  border: none;

  /* fixes zoom issues in many embeds */
  transform: scale(1);
  transform-origin: top left;
}
</style>
</head>

<body>

<div class="game-wrapper">
  <div class="game-container">
    <iframe 
      src="YOUR_GAME_URL_HERE"
      allowfullscreen>
    </iframe>
  </div>
</div>

</body>
</html>
