<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BitLife</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    /* TOP BAR */
    #topbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: #1e293b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      font-family: Arial;
    }

    #back {
      position: absolute;
      left: 10px;
      background: #334155;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* THIS IS THE IMPORTANT FIX */
    #gameWrapper {
      position: absolute;
      top: 50px;
      left: 0;
      right: 0;
      bottom: 0;

      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }

    /* FIXED GAME SIZE (prevents zoom stretch) */
    #gameContainer {
      width: 960px;
      height: 540px;
      max-width: 100%;
      max-height: 100%;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/TemplateData/UnityProgress.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/Build/UnityLoader.js"></script>
</head>

<body>

  <div id="topbar">
    <button id="back" onclick="location.href='games.html'">⬅ Back</button>
    🎮 BitLife
  </div>

  <div id="gameWrapper">
    <div id="gameContainer"></div>
  </div>

  <script>
    UnityLoader.instantiate(
      "gameContainer",
      "https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/Build/BitLife.json",
      { onProgress: UnityProgress }
    );
  </script>

</body>
</html>
